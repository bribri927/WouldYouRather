<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Your Vote!</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FFD700;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #7a5a00;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
    }

    .title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 32px;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1;
    }
    .title span { color: #c0392b; }

    .question-box {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 420px;
    }
    .question-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #FFD700;
      margin-bottom: 6px;
    }
    .question-a { font-size: 14px; color: #7ec8f5; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .question-b { font-size: 14px; color: #c9a8f5; font-weight: 700; line-height: 1.4; }
    .or-divider { font-size: 12px; color: #888; text-align: center; margin: 6px 0; font-weight: 700; }

    .vote-area {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .vote-btn {
      border: 3px solid #1a1a1a;
      border-radius: 16px;
      padding: 1.5rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
      cursor: pointer;
      box-shadow: 5px 5px 0 #1a1a1a;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      width: 100%;
    }
    .vote-btn:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 #1a1a1a; }
    .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-a { background: #2980b9; }
    .btn-b { background: #8e44ad; }
    .btn-letter {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 40px;
      line-height: 1;
      color: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .btn-text { line-height: 1.3; }

    .voted-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .voted-state.visible { display: flex; }
    .voted-icon {
      font-size: 64px;
      line-height: 1;
    }
    .voted-msg {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 28px;
      color: #1a1a1a;
    }
    .voted-sub {
      font-size: 15px;
      font-weight: 700;
      color: #5a4000;
    }
    .voted-choice {
      font-size: 16px;
      font-weight: 900;
      padding: 8px 20px;
      border-radius: 30px;
      border: 2.5px solid #1a1a1a;
      color: #fff;
    }
    .choice-a-pill { background: #2980b9; }
    .choice-b-pill { background: #8e44ad; }

    .loading-state {
      text-align: center;
      color: #5a4000;
      font-weight: 700;
      font-size: 16px;
    }

    .expired-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .expired-state.visible { display: flex; }
    .expired-msg {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 26px;
      color: #c0392b;
    }
    .expired-sub { font-size: 14px; font-weight: 700; color: #5a4000; }
  </style>
</head>
<body>
  <p class="eyebrow">Would You Rather?</p>
  <h1 class="title">Cast Your <span>Vote!</span></h1>

  <div id="loadingState" class="loading-state">Loading question...</div>

  <div class="question-box" id="questionBox" style="display:none">
    <div class="question-label">The Question</div>
    <div class="question-a" id="qTextA"></div>
    <div class="or-divider">-- OR --</div>
    <div class="question-b" id="qTextB"></div>
  </div>

  <div class="vote-area" id="voteArea" style="display:none">
    <button class="vote-btn btn-a" id="btnA" onclick="castVote('A')">
      <span class="btn-letter">A</span>
      <span class="btn-text" id="btnTextA"></span>
    </button>
    <button class="vote-btn btn-b" id="btnB" onclick="castVote('B')">
      <span class="btn-letter">B</span>
      <span class="btn-text" id="btnTextB"></span>
    </button>
  </div>

  <div class="voted-state" id="votedState">
    <div class="voted-icon">🗳️</div>
    <div class="voted-msg">Vote cast!</div>
    <div class="voted-choice" id="votedChoicePill"></div>
    <div class="voted-sub">Watch the big screen for results!</div>
  </div>

  <div class="expired-state" id="expiredState">
    <div class="voted-icon">⏰</div>
    <div class="expired-msg">Time's up!</div>
    <div class="expired-sub">Voting has closed for this round.</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('s');
    const optionA = params.get('a');
    const optionB = params.get('b');
    const expires = params.get('exp');

    let voted = false;

    function init() {
      if (!sessionId || !optionA || !optionB) {
        document.getElementById('loadingState').textContent = 'Invalid voting link. Please scan the QR code on the main screen.';
        return;
      }

      const now = Date.now();
      if (expires && now > parseInt(expires)) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('expiredState').classList.add('visible');
        return;
      }

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('qTextA').textContent = decodeURIComponent(optionA);
      document.getElementById('qTextB').textContent = decodeURIComponent(optionB);
      document.getElementById('btnTextA').textContent = decodeURIComponent(optionA);
      document.getElementById('btnTextB').textContent = decodeURIComponent(optionB);
      document.getElementById('questionBox').style.display = 'block';
      document.getElementById('voteArea').style.display = 'flex';

      if (expires) {
        const remaining = parseInt(expires) - now;
        if (remaining > 0) {
          setTimeout(() => {
            if (!voted) {
              document.getElementById('voteArea').style.display = 'none';
              document.getElementById('questionBox').style.display = 'none';
              document.getElementById('expiredState').classList.add('visible');
            }
          }, remaining);
        }
      }
    }

    async function castVote(choice) {
      if (voted) return;
      voted = true;

      document.getElementById('btnA').disabled = true;
      document.getElementById('btnB').disabled = true;

      try {
        await fetch('/.netlify/functions/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ choice, sessionId })
        });
      } catch (e) {
        console.error('Vote error:', e);
      }

      const pill = document.getElementById('votedChoicePill');
      pill.textContent = choice === 'A' ? decodeURIComponent(optionA) : decodeURIComponent(optionB);
      pill.className = 'voted-choice ' + (choice === 'A' ? 'choice-a-pill' : 'choice-b-pill');

      document.getElementById('voteArea').style.display = 'none';
      document.getElementById('questionBox').style.display = 'none';
      document.getElementById('votedState').classList.add('visible');
    }

    init();
  </script>
</body>
</html>
